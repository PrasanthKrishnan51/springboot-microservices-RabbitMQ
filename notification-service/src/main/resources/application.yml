server:
  port: 8083

spring:
  application:
    name: notification-service

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

  # Mail (configure with real SMTP for production)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:secret}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

rabbitmq:
  exchange:
    order: order.exchange
  queue:
    order-created: order.created.queue
    inventory-response: inventory.response.queue
  routing-key:
    order-created: order.created
    inventory-response: inventory.response

# Idempotency TTL for processed events (seconds)
notification:
  idempotency:
    ttl-seconds: 86400   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example.notificationservice: DEBUG
